<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found: MolPic Web</title>
<meta name="description" content="That page does not exist.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --paper:#F4F5F1; --card:#FCFCFA; --ink:#161A17; --ink-soft:#5A6058;
  --glass:#17573C; --glass-tint:#EDF3EF; --hazard:#A8560C; --hazard-tint:#FBF3EA;
  --rule:#D6D9D0; --radius:3px;
  --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:"Archivo",system-ui,-apple-system,"Segoe UI",sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);
  font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:1100px;margin:0 auto;padding:0 24px}
.section{padding:44px 0}
h1,h2,h3{letter-spacing:-0.02em;font-weight:600;margin:0 0 10px}
h1{font-size:32px;line-height:1.2}
h2{font-size:21px;margin-top:36px}
h3{font-size:16px;margin-top:26px}
p{margin:0 0 14px}
a{color:var(--glass)}
a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{
  outline:2px solid var(--glass);outline-offset:2px}
code,kbd{font-family:var(--mono);font-size:.88em;background:var(--card);
  border:1px solid var(--rule);border-radius:var(--radius);padding:1px 5px}
pre{background:var(--card);border:1px solid var(--rule);border-radius:var(--radius);
  padding:12px 14px;overflow-x:auto;font-family:var(--mono);font-size:12.5px;line-height:1.6}
pre code{background:none;border:none;padding:0}
.prose{max-width:70ch}
.prose ul,.prose ol{margin:0 0 14px;padding-left:20px}
.prose li{margin-bottom:6px}
.label{font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:.14em;
  text-transform:uppercase;color:var(--ink-soft);display:block;margin-bottom:8px}
.eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--glass);display:block;margin-bottom:12px}
.topbar{border-bottom:1px solid var(--rule)}
.topbar-inner{display:flex;align-items:center;gap:26px;height:60px}
.brand{font-size:19px;font-weight:600;letter-spacing:-.02em;text-decoration:none;color:var(--ink)}
.brand span{color:var(--glass)}
.nav{display:flex;gap:20px;margin-left:auto;flex-wrap:wrap}
.nav a{font-size:13.5px;text-decoration:none;color:var(--ink-soft);
  padding-bottom:2px;border-bottom:1px solid transparent}
.nav a:hover{color:var(--ink)}
.nav a.active{color:var(--ink);border-bottom-color:var(--glass)}
@media (max-width:700px){.topbar-inner{height:auto;padding:12px 0;flex-wrap:wrap;gap:12px}
  .nav{margin-left:0;width:100%;gap:16px}}
.hero{border-bottom:1px solid var(--rule);padding:40px 0 34px}
.hero p{color:var(--ink-soft);max-width:60ch;margin-bottom:0}
.hero .meta{font-family:var(--mono);font-size:11.5px;color:var(--ink-soft);
  margin-top:16px;display:flex;gap:18px;flex-wrap:wrap}
.field{margin-bottom:20px}
input[type=text],textarea,select{background:var(--card);color:var(--ink);
  border:1px solid var(--rule);border-radius:var(--radius);font-family:var(--mono);font-size:13px}
input[type=text],textarea{width:100%;padding:10px 12px;line-height:1.5}
textarea{resize:vertical;min-height:78px}
select{padding:5px 7px;font-size:12px}
input:focus,textarea:focus{border-color:var(--glass)}
.row{display:flex;gap:8px}
.row input{flex:1}
button{font-family:var(--sans);font-size:14px;font-weight:500;background:var(--ink);
  color:var(--paper);border:1px solid var(--ink);border-radius:var(--radius);
  padding:9px 16px;cursor:pointer}
button:hover{background:var(--glass);border-color:var(--glass)}
button.ghost{background:transparent;color:var(--ink);border-color:var(--rule)}
button.ghost:hover{background:var(--card);border-color:var(--glass);color:var(--glass)}
button[disabled]{opacity:.4;cursor:not-allowed}
button[disabled]:hover{background:var(--ink);border-color:var(--ink)}
button.ghost[disabled]:hover{background:transparent;border-color:var(--rule);color:var(--ink)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-family:var(--mono);font-size:11.5px;font-weight:400;padding:4px 9px;
  background:transparent;border:1px solid var(--rule);color:var(--ink-soft);
  border-radius:var(--radius);cursor:pointer}
.chip:hover{border-color:var(--glass);color:var(--glass);background:transparent}
.opts{display:flex;flex-wrap:wrap;gap:18px;align-items:center;margin-bottom:14px}
.opt{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ink-soft)}
.opt label{cursor:pointer}
input[type=checkbox]{accent-color:var(--glass);width:15px;height:15px;cursor:pointer}
.specimen{background:var(--card);border:1px solid var(--rule);border-radius:var(--radius);overflow:hidden}
.stage{display:flex;align-items:center;justify-content:center;min-height:380px;padding:26px;
  background-image:linear-gradient(var(--rule) 1px,transparent 1px),
                   linear-gradient(90deg,var(--rule) 1px,transparent 1px);
  background-size:22px 22px;background-position:-1px -1px;background-color:var(--card)}
.stage svg{max-width:100%;height:auto;display:block}
.stage.is-empty{color:var(--ink-soft);font-size:14px;text-align:center;padding:40px}
.strip{border-top:1px solid var(--rule);display:grid;grid-template-columns:repeat(3,1fr)}
.cell{padding:11px 14px;border-right:1px solid var(--rule)}
.cell:last-child{border-right:none}
.cell .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;
  color:var(--ink-soft);display:block;margin-bottom:3px}
.cell .v{font-family:var(--mono);font-size:13px}
.smilesbar{border-top:1px solid var(--rule);padding:11px 14px;font-family:var(--mono);
  font-size:12px;word-break:break-all;color:var(--ink-soft)}
.smilesbar b{color:var(--ink);font-weight:400}
.exports{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
.msg{font-size:13.5px;padding:9px 12px;border-radius:var(--radius);margin-bottom:16px;
  border-left:2px solid var(--hazard);background:var(--hazard-tint);color:var(--hazard)}
.msg.quiet{border-left-color:var(--ink-soft);background:var(--card);color:var(--ink-soft)}
.msg[hidden]{display:none}
.cols{display:grid;grid-template-columns:340px 1fr;gap:34px;align-items:start}
@media (max-width:860px){.cols{grid-template-columns:1fr;gap:26px}}
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media (max-width:800px){.tiles{grid-template-columns:1fr}}
.tile{background:var(--card);border:1px solid var(--rule);border-radius:var(--radius);padding:18px}
.tile h3{margin:0 0 6px;font-size:15px}
.tile p{margin:0;font-size:13.5px;color:var(--ink-soft)}
.callout{background:var(--glass-tint);border-left:2px solid var(--glass);
  border-radius:var(--radius);padding:14px 16px;margin:20px 0;font-size:14px}
.callout p:last-child{margin-bottom:0}
table{border-collapse:collapse;width:100%;font-size:13.5px;margin-bottom:16px}
th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--rule);vertical-align:top}
th{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--ink-soft);font-weight:500}
.steps{counter-reset:step;list-style:none;padding:0;margin:0}
.steps li{counter-increment:step;position:relative;padding-left:38px;margin-bottom:20px}
.steps li::before{content:counter(step,decimal-leading-zero);position:absolute;left:0;top:1px;
  font-family:var(--mono);font-size:11px;color:var(--glass);letter-spacing:.05em}
footer{border-top:1px solid var(--rule);margin-top:56px;padding:24px 0 44px;
  font-size:12.5px;color:var(--ink-soft)}
.foot-inner{display:flex;gap:20px;flex-wrap:wrap;justify-content:space-between}
footer a{color:var(--glass)}
</style>
</head>

<footer>
